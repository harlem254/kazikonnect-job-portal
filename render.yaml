# Render Blueprint — Job Portal (monorepo)
# Deploy: Render Dashboard → New → Blueprint → connect this repository

services:
  # ── Backend API (Express + Supabase) ────────────────────────────────────────
  - type: web
    name: job-portal-api
    runtime: node
    region: oregon
    plan: free
    rootDir: BACKEND
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: CORS_ORIGIN
        fromService:
          name: job-portal-frontend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      # Optional: comma-separate multiple origins for previews, e.g.
      # https://job-portal-frontend.onrender.com,https://job-portal-frontend-pr-1.onrender.com

  # ── Frontend (Vite + React static site) ─────────────────────────────────────
  - type: web
    name: job-portal-frontend
    runtime: static
    rootDir: FRONTEND
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: VITE_API_URL
        fromService:
          name: job-portal-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
